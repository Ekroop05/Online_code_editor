services:
  - type: web
    name: online-code-edit-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_COLLECTION_NAME
        value: files
      - key: CORS_ORIGINS
        sync: false
